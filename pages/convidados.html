<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marcos & Ana</title>
    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="../assets/css/layout.css">
    <link rel="stylesheet" href="../assets/css/menu.css">
    <link rel="stylesheet" href="../assets/css/convidados.css">
    <link rel="stylesheet" href="../assets/css/footer.css">
</head>
<body class="bg-overlay">
    
    <main>
        <header>
        <div id="menu-container"></div>

        <h1 class="title">Confirmação de Presença</h1>
    </header>

    <section class="container">
        <h2>Confirme sua presença 💌</h2>

        <input type="text" id="nomeConvidado" placeholder="Digite seu nome">

        <button class="botao" onclick="confirmarPresenca()">
            Confirmar  
        </button>

    </section>

    <section class="lista">

        <h2>Lista de Confirmados</h2>

        <ul id="listaConvidados"></ul>

        <template id="templateConvidado">
                <li class="lista-items">
                    <span class="nome"></span>
                    <button class="remover">❌</button>
                </li>
            </template>

    </section>
    </main>

    <div id="footer-container"></div>

    <script src="../assets/js/main.js"></script>
    <script src="../assets/js/convidados.js"></script>
    
</body>
</html>
